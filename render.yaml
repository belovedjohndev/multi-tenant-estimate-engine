services:
  - type: web
    name: estimate-engine-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WIDGET_ORIGIN
        sync: false
      - key: PORTAL_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: LEAD_NOTIFICATION_FROM_EMAIL
        sync: false
      - key: LEAD_NOTIFICATION_TIMEOUT_MS
        sync: false
      - key: CLIENT_PORTAL_SESSION_TTL_HOURS
        sync: false
      - key: CLIENT_PORTAL_COOKIE_SECURE
        sync: false
      - key: CLIENT_PORTAL_COOKIE_SAME_SITE
        sync: false
      - key: CLIENT_PORTAL_COOKIE_NAME
        sync: false
